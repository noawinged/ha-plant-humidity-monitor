# ==============================================================================
# PROJECT: Plant Humidity Monitor
# FILE: plant-monitor-prod.yaml
# DESCRIPTION: Raw data sender. 15-minute measurement cycle.
# USE CASE: Sends uncalibrated voltage to HA where logic and offset are handled.
# ==============================================================================

esphome:
  name: plant-humidity-monitor
  friendly_name: plant-humidity-monitor

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret device_api_key

ota:
  - platform: esphome
    password: !secret device_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Plant-Humidity-Monitor"
    password: !secret device_ap_password

captive_portal:

switch:
  - platform: gpio
    pin: GPIO38
    id: power_sensor_1
  - platform: gpio
    pin: GPIO39
    id: power_sensor_2
  - platform: gpio
    pin: GPIO40
    id: power_sensor_3
  - platform: gpio
    pin: GPIO41
    id: power_sensor_4

sensor:
  - platform: adc
    pin: GPIO1
    name: "Soil Moisture 1 Raw"
    update_interval: never
    attenuation: 12db
    accuracy_decimals: 2
    id: moisture_sensor_1
    unit_of_measurement: "V"
    device_class: voltage

  - platform: adc
    pin: GPIO2
    name: "Soil Moisture 2 Raw"
    update_interval: never
    attenuation: 12db
    accuracy_decimals: 2
    id: moisture_sensor_2
    unit_of_measurement: "V"
    device_class: voltage

  - platform: adc
    pin: GPIO4
    name: "Soil Moisture 3 Raw"
    update_interval: never
    attenuation: 12db
    accuracy_decimals: 2
    id: moisture_sensor_3
    unit_of_measurement: "V"
    device_class: voltage

  - platform: adc
    pin: GPIO5
    name: "Soil Moisture 4 Raw"
    update_interval: never
    attenuation: 12db
    accuracy_decimals: 2
    id: moisture_sensor_4
    unit_of_measurement: "V"
    device_class: voltage

# Script that handles the safe measurement sequence for all sensors
script:
  - id: measure_soil
    then:
      - switch.turn_on: power_sensor_1
      - delay: 2s
      - component.update: moisture_sensor_1
      - switch.turn_off: power_sensor_1
      
      - switch.turn_on: power_sensor_2
      - delay: 2s
      - component.update: moisture_sensor_2
      - switch.turn_off: power_sensor_2
      
      - switch.turn_on: power_sensor_3
      - delay: 2s
      - component.update: moisture_sensor_3
      - switch.turn_off: power_sensor_3
      
      - switch.turn_on: power_sensor_4
      - delay: 2s
      - component.update: moisture_sensor_4
      - switch.turn_off: power_sensor_4

# Run the script automatically every 15 minutes
interval:
  - interval: 15min
    then:
      - script.execute: measure_soil

# Expose a button to Home Assistant for manual triggering
button:
  - platform: template
    name: "Force Update"
    id: force_update_btn
    icon: "mdi:update"
    on_press:
      then:
        - script.execute: measure_soil