# ==============================================================================
# PROJECT: Plant Humidity Monitor
# FILE: plant-monitor-live.yaml
# DESCRIPTION: Live monitoring mode. Continuous power and 2s update interval.
# USE CASE: Calibration, physical sensor placement in soil, and real-time 
#           observing of sensor responses during watering tests.
# ==============================================================================

esphome:
  name: plant-humidity-monitor
  friendly_name: plant-humidity-monitor

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret device_api_key

ota:
  - platform: esphome
    password: !secret device_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot in case wifi connection fails
  ap:
    ssid: "Plant-Humidity-Monitor"
    password: !secret device_ap_password

captive_portal:
    
# Unoptimized testing mode with power lines constantly enabled
switch:
  - platform: gpio
    pin: GPIO38
    id: power_sensor_1
    restore_mode: ALWAYS_ON
  - platform: gpio
    pin: GPIO39
    id: power_sensor_2
    restore_mode: ALWAYS_ON
  - platform: gpio
    pin: GPIO40
    id: power_sensor_3
    restore_mode: ALWAYS_ON
  - platform: gpio
    pin: GPIO41
    id: power_sensor_4
    restore_mode: ALWAYS_ON

# Live sensors updating every 2 seconds with linear calibration filters
sensor:
  - platform: adc
    pin: GPIO1
    name: "Soil Moisture 1"
    update_interval: 2s
    attenuation: 12db
    accuracy_decimals: 0
    id: moisture_sensor_1
    unit_of_measurement: "%"
    device_class: humidity
    filters:
      - calibrate_linear:
          - 3.14 -> 0.0
          - 1.10 -> 100.0
      - round: 0

  - platform: adc
    pin: GPIO2
    name: "Soil Moisture 2"
    update_interval: 2s
    attenuation: 12db
    accuracy_decimals: 0
    id: moisture_sensor_2
    unit_of_measurement: "%"
    device_class: humidity
    filters:
      - calibrate_linear:
          - 3.14 -> 0.0
          - 1.12 -> 100.0
      - round: 0

  - platform: adc
    pin: GPIO4
    name: "Soil Moisture 3"
    update_interval: 2s
    attenuation: 12db
    accuracy_decimals: 0
    id: moisture_sensor_3
    unit_of_measurement: "%"
    device_class: humidity
    filters:
      - calibrate_linear:
          - 3.14 -> 0.0
          - 1.05 -> 100.0
      - round: 0

  - platform: adc
    pin: GPIO5
    name: "Soil Moisture 4"
    update_interval: 2s
    attenuation: 12db
    accuracy_decimals: 0
    id: moisture_sensor_4
    unit_of_measurement: "%"
    device_class: humidity
    filters:
      - calibrate_linear:
          - 3.14 -> 0.0
          - 1.10 -> 100.0
      - round: 0